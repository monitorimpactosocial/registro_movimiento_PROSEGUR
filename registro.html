<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PROSEGUR</title>
    <link rel="stylesheet" href="app/css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="app-header compact">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <span class="material-icons">arrow_back</span>
        </button>
        <h2 id="page-title">Cargando...</h2>
    </header>

    <main class="form-container">
        <form id="registro-form" onsubmit="event.preventDefault(); App.saveRegistro();">
            <input type="hidden" id="tipo_movimiento" name="tipo_movimiento" value="">

            <section class="form-section">
                <h3>Datos Generales</h3>

                <div class="form-group">
                    <label for="registrante">Nombre del Guardia/Registrante *</label>
                    <input type="text" id="registrante" name="registrante" required placeholder="Ej. Juan Pérez">
                </div>

                <div class="form-group">
                    <label for="puesto_control">Puesto de Control *</label>
                    <select id="puesto_control" name="puesto_control" required>
                        <option value="">Seleccione...</option>
                    </select>
                </div>
            </section>

            <section class="form-section">
                <h3>Datos del Transeúnte</h3>

                <div class="form-group">
                    <label for="transeunte_nombre">Nombre y Apellido *</label>
                    <input type="text" id="transeunte_nombre" name="transeunte_nombre" required
                        placeholder="Nombre de quien ingresa/sale">
                </div>

                <div class="form-group">
                    <label for="transeunte_doc">Documento (Opcional)</label>
                    <input type="text" id="transeunte_doc" name="transeunte_doc" placeholder="Nro de C.I. o Pasaporte">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="acompanantes">Acompañantes</label>
                        <input type="number" id="acompanantes" name="acompanantes" min="0" value="0"
                            onchange="App.handleAcompanantes()">
                    </div>
                    <div class="form-group">
                        <label for="sexo">Sexo (Opc.)</label>
                        <select id="sexo" name="sexo">
                            <option value="">--</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                </div>

                <!-- Contenedor dinámico para detalles de los acompañantes -->
                <div id="acompanantes_container"></div>
            </section>

            <section class="form-section">
                <h3>Movilidad y Ubicación</h3>

                <div class="form-group">
                    <label for="medio_transporte">Medio de Transporte *</label>
                    <select id="medio_transporte" name="medio_transporte" required
                        onchange="App.handleSpecify('medio_transporte')">
                        <option value="">Seleccione...</option>
                    </select>
                    <input type="text" id="medio_transporte_otro" class="hidden specify-input"
                        placeholder="Especifique el transporte">
                </div>

                <div class="form-group">
                    <label for="origen">Lugar de Origen *</label>
                    <select id="origen" name="origen" required onchange="App.handleSpecify('origen')">
                        <option value="">Seleccione...</option>
                    </select>
                    <input type="text" id="origen_otro" class="hidden specify-input" placeholder="Especifique origen">
                </div>

                <div class="form-group">
                    <label for="destino">Lugar de Destino *</label>
                    <input type="text" id="destino" name="destino" required placeholder="Ej. Retiro 3, Parcela X...">
                </div>

                <div class="form-group">
                    <label for="motivo">Motivo de Ingreso/Desplazamiento *</label>
                    <select id="motivo" name="motivo" required onchange="App.handleSpecify('motivo')">
                        <option value="">Seleccione...</option>
                    </select>
                    <input type="text" id="motivo_otro" class="hidden specify-input" placeholder="Especifique motivo">
                </div>
            </section>

            <section class="form-section">
                <h3>Observaciones</h3>
                <div class="form-group">
                    <textarea id="observaciones" name="observaciones" rows="3"
                        placeholder="Información adicional..."></textarea>
                </div>
            </section>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block btn-lg shadow">
                    <span class="material-icons">save</span> Guardar Registro Local
                </button>
            </div>
        </form>
    </main>

    <script src="app/js/db.js"></script>
    <script src="app/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.checkAuth();
            App.initRegistroFlow();
        });
    </script>
</body>

</html>
